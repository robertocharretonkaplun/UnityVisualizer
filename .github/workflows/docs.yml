name: Generate & Deploy Doxygen Docs

on:
  push:
    branches: [main]
    paths:
      - 'UnityVisualizer/Assets/ProductVisualizer/**'
      - 'Doxyfile'
      - 'README.md'
  workflow_dispatch:

permissions:
  contents: read
  pages:    write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # ── 1. Build ──────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify source files
        run: |
          count=$(find UnityVisualizer/Assets/ProductVisualizer/Scripts \
                       UnityVisualizer/Assets/ProductVisualizer/Editor \
                  -name "*.cs" 2>/dev/null | wc -l)
          echo "Found $count .cs files"
          [ "$count" -gt 0 ] || { echo "ERROR: no .cs files found"; exit 1; }

      - name: Install Doxygen + Graphviz
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends doxygen graphviz

      - name: Run Doxygen
        run: doxygen Doxyfile

      - name: Verify output
        run: |
          echo "HTML files : $(find docs/html -name '*.html' | wc -l)"
          echo "Class pages: $(find docs/html -name 'class_*.html' | wc -l)"
          test -f docs/html/index.html || { echo "ERROR: index.html missing"; exit 1; }

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/html

  # ── 2. Deploy ─────────────────────────────────────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
