name: Generate & Deploy Doxygen Docs

on:
  push:
    branches: [main]
    paths:
      - 'UnityVisualizer/Assets/ProductVisualizer/**'
      - 'Doxyfile'
      - 'README.md'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Doxygen and Graphviz
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends doxygen graphviz

      - name: Generate Doxygen HTML
        run: doxygen Doxyfile

      - name: Verify output
        run: |
          test -f docs/html/index.html || { echo "ERROR: index.html not found"; exit 1; }
          echo "OK — $(find docs/html -name '*.html' | wc -l) HTML files generated"

      # Push docs/html directly to the gh-pages branch using plain git.
      # No third-party actions — no Node.js version warnings.
      - name: Deploy to gh-pages
        run: |
          cd docs/html
          git init -b gh-pages
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          touch .nojekyll
          git add .
          git commit -m "docs: regenerate Doxygen [skip ci]"
          git push -f \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" \
            gh-pages
