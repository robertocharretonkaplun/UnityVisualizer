name: Generate & Deploy Doxygen Docs

on:
  push:
    branches: [main]
    paths:
      - 'UnityVisualizer/Assets/ProductVisualizer/**'
      - 'Doxyfile'
      - 'README.md'
  workflow_dispatch:   # allow manual trigger from the Actions tab

permissions:
  contents: write      # needed to push to gh-pages branch

concurrency:
  group: gh-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build Doxygen & Deploy to gh-pages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Doxygen and Graphviz
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends doxygen graphviz

      - name: Generate Doxygen HTML
        run: doxygen Doxyfile

      # peaceiris/actions-gh-pages pushes the output to the gh-pages branch
      # and adds .nojekyll automatically (enable_jekyll: false).
      # In Settings → Pages, set source: "Deploy from branch gh-pages / (root)".
      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/html
          enable_jekyll: false
          commit_message: "docs: regenerate Doxygen [skip ci]"
