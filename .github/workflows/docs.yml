name: Generate & Deploy Doxygen Docs

on:
  push:
    branches: [main]
    paths:
      - 'UnityVisualizer/Assets/ProductVisualizer/**'
      - 'Doxyfile'
      - 'README.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify source files
        run: |
          count=$(find UnityVisualizer/Assets/ProductVisualizer/Scripts \
                       UnityVisualizer/Assets/ProductVisualizer/Editor \
                  -name "*.cs" 2>/dev/null | wc -l)
          echo "Found $count .cs files"
          [ "$count" -gt 0 ] || { echo "ERROR: no .cs files found"; exit 1; }

      - name: Install Doxygen + Graphviz
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends doxygen graphviz

      - name: Generate Doxygen HTML
        run: doxygen Doxyfile

      - name: Verify output
        run: |
          echo "HTML files : $(find docs -name '*.html' | wc -l)"
          echo "Class pages: $(find docs -name 'class_*.html' | wc -l)"
          test -f docs/index.html || { echo "ERROR: index.html missing"; exit 1; }

      - name: Add .nojekyll
        run: touch docs/.nojekyll

      - name: Commit and push docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "docs: regenerate Doxygen [skip ci]"
          git push
