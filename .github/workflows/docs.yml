name: Generate & Deploy Doxygen Docs

on:
  push:
    branches: [main]
    paths:
      - 'UnityVisualizer/Assets/ProductVisualizer/**'
      - 'Doxyfile'
      - 'README.md'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Doxygen and Graphviz
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends doxygen graphviz

      - name: Generate Doxygen HTML
        run: doxygen Doxyfile

      - name: Verify output exists
        run: |
          echo "=== docs/html contents ==="
          ls -la docs/html/ || { echo "ERROR: docs/html not found"; exit 1; }
          echo "=== index.html check ==="
          test -f docs/html/index.html || { echo "ERROR: index.html missing"; exit 1; }
          echo "OK: index.html found"

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/html
          enable_jekyll: false
          force_orphan: true
          commit_message: "docs: regenerate Doxygen [skip ci]"
